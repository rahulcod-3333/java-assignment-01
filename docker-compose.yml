version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Rahul@123
      POSTGRES_DB: backend_assignment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: assignment_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: